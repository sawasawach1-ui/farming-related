```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農作業・出荷記録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 同期ステータスバー -->
<div id="syncBar"></div>

<!-- ナビゲーション -->
<nav>
  <button class="active" onclick="showScreen('input')">入力</button>
  <button onclick="showScreen('pending')">
    未確定<span id="pendingCount" class="count-badge" style="display:none">0</span>
  </button>
  <button onclick="showScreen('confirmed')">確定済み</button>
  <button onclick="showScreen('settings')">設定</button>
</nav>

<!-- ① 入力画面 -->
<div id="screen-input" class="screen active">
  <div class="card">
    <h1>作業・出荷を記録</h1>
    <div id="aiStatusBanner"></div>
    <div class="alert-info">
      例：「今日はハウス1できゅうり収穫、農総研に3袋出荷」
    </div>
    <div class="form-row">
      <label>担当者</label>
      <select id="inputPerson">
        <option>Toshimi</option>
        <option>Aydee</option>
      </select>
    </div>
    <div class="form-row">
      <label>内容を入力</label>
      <textarea id="inputText" placeholder="作業内容や出荷内容を自由に入力..."></textarea>
    </div>
    <button class="btn btn-voice" onclick="startVoice()">🎤 音声で入力</button>
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeInput()">AIで解析して確認 →</button>
  </div>
</div>

<!-- ② 確認画面（動的生成） -->
<div id="screen-confirm" class="screen">
  <div id="confirmContent"></div>
</div>

<!-- ③ 未確定一覧 -->
<div id="screen-pending" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h1 style="margin:0;">未確定の記録</h1>
    <button onclick="refreshRecords()"
            style="background:#e8f5e9;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;">
      🔄 更新
    </button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="filterList('pending','all',this)">すべて</button>
    <button class="tab" onclick="filterList('pending','work',this)">作業</button>
    <button class="tab" onclick="filterList('pending','shipping',this)">出荷</button>
  </div>
  <div id="pendingList"></div>
</div>

<!-- ④ 確定済み一覧 -->
<div id="screen-confirmed" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h1 style="margin:0;">確定済みの記録</h1>
    <button onclick="refreshRecords()"
            style="background:#e8f5e9;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;">
      🔄 更新
    </button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="filterList('confirmed','all',this)">すべて</button>
    <button class="tab" onclick="filterList('confirmed','work',this)">作業</button>
    <button class="tab" onclick="filterList('confirmed','shipping',this)">出荷</button>
  </div>
  <div id="confirmedList"></div>
</div>

<!-- ⑤ 設定画面 -->
<div id="screen-settings" class="screen">
  <h1>設定</h1>
  <div class="card">
    <h2 style="font-size:16px;margin-bottom:12px;">☁ Google Sheets 接続状態</h2>
    <div id="sheetStatus"></div>
    <button class="btn btn-primary" style="margin-top:12px;" onclick="testConnection()">接続テスト</button>
  </div>
  <div class="card">
    <h2 style="font-size:16px;margin-bottom:12px;">🤖 Claude APIキー（任意）</h2>
    <div id="apiStatusDisplay"></div>
    <div class="form-row" style="margin-top:12px;">
      <label>APIキー（sk-ant-...）</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    </div>
    <div class="alert-warn" style="font-size:13px;">
      ⚠ APIキーはこのブラウザにのみ保存されます。
    </div>
    <button class="btn btn-primary" onclick="onSaveApiKey()">保存する</button>
    <button class="btn btn-secondary" onclick="onClearApiKey()">削除する</button>
  </div>
</div>

<!-- JS（読み込み順序が重要） -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/analyze.js"></script>
<script src="js/records.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
```

---

保存できたら「次」と言ってください → `css/style.css` を出します！
